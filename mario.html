<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Super Mario</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; }
canvas { display: block; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="c" width="800" height="500"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── Level data ──────────────────────────────────────────────────────────────
const LEVEL_W  = 3200;
const GROUND_Y = 440;

// [x, y, w, h]
const PLATFORM_DATA = [
  [0,    GROUND_Y, LEVEL_W, 60],
  [250,  370, 120, 16],
  [440,  310, 120, 16],
  [640,  370, 150, 16],
  [850,  300, 120, 16],
  [1050, 360, 140, 16],
  [1250, 280, 100, 16],
  [1430, 340, 130, 16],
  [1650, 260, 120, 16],
  [1850, 340, 150, 16],
  [2050, 290, 110, 16],
  [2250, 360, 130, 16],
  [2450, 300, 120, 16],
  [2650, 370, 140, 16],
  [2850, 310, 100, 16],
];

// [x, y, patrolRange]
const ENEMY_DATA = [
  [350,  GROUND_Y - 30, 80],
  [700,  354,           80],
  [950,  284,           80],
  [1300, GROUND_Y - 30, 90],
  [1500, 324,           70],
  [1900, 324,           90],
  [2100, GROUND_Y - 30, 100],
  [2500, 284,           80],
  [2700, 354,           90],
];

// [x, y]
const COIN_DATA = [
  [270, 340], [310, 340], [350, 340],
  [460, 280], [500, 280],
  [660, 340], [700, 340],
  [870, 270], [910, 270],
  [1070, 330], [1110, 330],
  [1270, 250], [1310, 250],
  [1460, 310], [1500, 310],
  [1670, 230], [1710, 230],
  [1870, 310], [1910, 310],
  [2270, 330], [2310, 330],
  [2470, 270], [2510, 270],
  [2670, 340], [2710, 340],
];

// Question boxes: [x, y]  (32×32, Mario hits from below to spawn mushroom)
const QBOX_W = 32, QBOX_H = 32;
const QBOX_DATA = [
  [210,  320],   // reachable from ground
  [380,  255],   // above platform y=370
  [560,  245],   // above platform y=310
  [780,  285],   // reachable from ground
  [980,  250],   // above platform y=300
  [1160, 315],   // reachable from ground
  [1460, 255],   // above platform y=340
  [1760, 210],   // above platform y=260
  [1970, 285],   // above platform y=340
  [2210, 315],   // reachable from ground
  [2570, 260],   // above platform y=300
  [2880, 275],   // above platform y=310
];

const MUSHROOM_H = 22, MUSHROOM_W = 22;
const FLOWER_W = 16, FLOWER_H = 24;
const FIREBALL_W = 10, FIREBALL_H = 10;
const FIREBALL_SPEED = 7;

const FLAG_X = 3050;

// ── Constants ────────────────────────────────────────────────────────────────
const GRAVITY     = 0.55;
const JUMP_VEL    = -13;
const SPEED       = 4;
const COIN_SIZE   = 14;
const ENEMY_W     = 32;
const ENEMY_H     = 28;
const SMALL_W = 28, SMALL_H = 36;
const BIG_W   = 34, BIG_H   = 52;

// ── Input ────────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true;  e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.code] = false; });
function pressed(...codes) { return codes.some(c => keys[c]); }

// ── Helpers ──────────────────────────────────────────────────────────────────
function rectOverlap(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

// ── Game state ───────────────────────────────────────────────────────────────
let state, score, lives, cameraX;
let player, platforms, enemies, coins, mushrooms, flowers, fireballs, qboxes, flag;
let deathTimer, wonTimer, fireballCooldown;

function resetGame() {
  score = 0; lives = 3; cameraX = 0;
  state = 'start';
  buildLevel();
}

function buildLevel() {
  player = {
    x: 80, y: GROUND_Y - SMALL_H,
    vx: 0, vy: 0,
    w: SMALL_W, h: SMALL_H,
    big: false, fire: false,
    onGround: false,
    dead: false, invincible: 0,
    facing: 1,
  };
  platforms = PLATFORM_DATA.map(([x,y,w,h]) => ({x,y,w,h}));
  enemies   = ENEMY_DATA.map(([x,y,r]) => ({
    x, y: y - ENEMY_H, w: ENEMY_W, h: ENEMY_H,
    vx: 1.2, startX: x, range: r, dead: false, deadTimer: 0,
  }));
  coins     = COIN_DATA.map(([x,y]) => ({x, y, collected: false}));
  mushrooms = [];
  flowers   = [];
  fireballs = [];
  fireballCooldown = 0;
  qboxes    = QBOX_DATA.map(([x,y]) => ({x, y, hit: false, bumpTimer: 0}));
  flag = { x: FLAG_X, y: GROUND_Y - 160, w: 12, h: 160, reached: false };
  deathTimer = 0; wonTimer = 0;
}

// ── Player logic ─────────────────────────────────────────────────────────────
function updatePlayer() {
  if (player.dead) {
    deathTimer--;
    if (deathTimer <= 0) {
      lives--;
      if (lives <= 0) { state = 'gameover'; return; }
      buildLevel(); state = 'play';
    }
    return;
  }

  if (player.invincible > 0) player.invincible--;
  if (fireballCooldown > 0) fireballCooldown--;

  if (pressed('ArrowLeft','KeyA'))       { player.vx = -SPEED; player.facing = -1; }
  else if (pressed('ArrowRight','KeyD')) { player.vx =  SPEED; player.facing =  1; }
  else player.vx = 0;

  if (pressed('ArrowUp','KeyW','Space') && player.onGround) {
    player.vy = JUMP_VEL;
    player.onGround = false;
  }

  if (pressed('KeyX') && player.fire && fireballCooldown === 0) {
    fireballCooldown = 22;
    fireballs.push({
      x: player.facing === 1 ? player.x + player.w : player.x - FIREBALL_W,
      y: player.y + player.h * 0.4,
      vx: FIREBALL_SPEED * player.facing,
      vy: -2,
      bounces: 0,
      active: true,
    });
  }

  player.vy += GRAVITY;
  player.x  += player.vx;
  player.y  += player.vy;

  if (player.x < 0) player.x = 0;
  if (player.x + player.w > LEVEL_W) player.x = LEVEL_W - player.w;

  // Combine platforms + question boxes into one solid list
  const bumpY = b => b.y - (b.bumpTimer > 8 ? 16 - b.bumpTimer : b.bumpTimer);
  const solids = [
    ...platforms,
    ...qboxes.map(b => ({x: b.x, y: bumpY(b), w: QBOX_W, h: QBOX_H, _box: b})),
  ];

  player.onGround = false;
  for (const p of solids) {
    if (rectOverlap(player.x, player.y, player.w, player.h, p.x, p.y, p.w, p.h)) {
      const overlapBottom = (player.y + player.h) - p.y;
      const overlapTop    = (p.y + p.h) - player.y;
      const overlapLeft   = (player.x + player.w) - p.x;
      const overlapRight  = (p.x + p.w) - player.x;
      const minO = Math.min(overlapBottom, overlapTop, overlapLeft, overlapRight);
      if (minO === overlapBottom && player.vy >= 0) {
        player.y = p.y - player.h; player.vy = 0; player.onGround = true;
      } else if (minO === overlapTop && player.vy < 0) {
        player.y = p.y + p.h; player.vy = 0;
        if (p._box && !p._box.hit) hitBox(p._box);  // head bump!
      } else if (minO === overlapLeft) {
        player.x = p.x - player.w;
      } else if (minO === overlapRight) {
        player.x = p.x + p.w;
      }
    }
  }

  if (player.y > canvas.height + 100) killPlayer();
}

function growPlayer() {
  const oldH = player.h;
  player.big = true;
  player.w = BIG_W;
  player.h = BIG_H;
  player.y -= (player.h - oldH);
  player.invincible = 120;
}

function shrinkPlayer() {
  const oldH = player.h;
  player.big = false;
  player.fire = false;
  player.w = SMALL_W;
  player.h = SMALL_H;
  player.y += (oldH - player.h);
  player.invincible = 120;
}

function firePlayer() {
  if (!player.big) {
    const oldH = player.h;
    player.big = true;
    player.w = BIG_W;
    player.h = BIG_H;
    player.y -= (player.h - oldH);
  }
  player.fire = true;
  player.invincible = 120;
}

function killPlayer() {
  if (player.invincible > 0 || player.dead) return;
  if (player.fire) { player.fire = false; player.invincible = 120; return; }
  if (player.big)  { shrinkPlayer(); return; }
  player.dead = true;
  player.vy = -10;
  deathTimer = 90;
}

// ── Question box logic ────────────────────────────────────────────────────────
function hitBox(box) {
  box.hit = true;
  box.bumpTimer = 16;
  if (player.big && !player.fire) {
    flowers.push({
      x: box.x + QBOX_W / 2 - FLOWER_W / 2,
      y: box.y - FLOWER_H - 2,
      vx: 1.8, vy: 0, collected: false,
    });
  } else if (!player.big) {
    mushrooms.push({
      x: box.x + QBOX_W / 2 - MUSHROOM_W / 2,
      y: box.y - MUSHROOM_H - 2,
      vx: 1.8, vy: 0, collected: false,
    });
  }
}

function updateQBoxes() {
  for (const b of qboxes) {
    if (b.bumpTimer > 0) b.bumpTimer--;
  }
}

// ── Enemy logic ───────────────────────────────────────────────────────────────
function updateEnemies() {
  for (const e of enemies) {
    if (e.dead) { e.deadTimer--; continue; }
    e.x += e.vx;
    if (e.x <= e.startX - e.range || e.x + e.w >= e.startX + e.range) e.vx *= -1;

    if (!player.dead && player.invincible === 0 &&
        rectOverlap(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
      const playerBottom = player.y + player.h;
      const enemyTop     = e.y;
      if (player.vy > 0 && playerBottom - enemyTop < 16) {
        e.dead = true; e.deadTimer = 30;
        player.vy = -8;
        score += 100;
      } else {
        killPlayer();
      }
    }
  }
}

// ── Mushroom logic ────────────────────────────────────────────────────────────
function updateMushrooms() {
  for (const m of mushrooms) {
    if (m.collected) continue;
    m.vy += GRAVITY * 0.85;
    m.x  += m.vx;
    m.y  += m.vy;

    // Land on platforms
    for (const p of platforms) {
      if (rectOverlap(m.x, m.y, MUSHROOM_W, MUSHROOM_H, p.x, p.y, p.w, p.h)) {
        if (m.vy >= 0) { m.y = p.y - MUSHROOM_H; m.vy = 0; }
      }
    }
    // Bounce off level edges
    if (m.x < 0)                        { m.x = 0;                    m.vx =  Math.abs(m.vx); }
    if (m.x + MUSHROOM_W > LEVEL_W)     { m.x = LEVEL_W - MUSHROOM_W; m.vx = -Math.abs(m.vx); }
    // Remove if it falls off screen
    if (m.y > canvas.height + 60) { m.collected = true; continue; }

    // Collect
    if (rectOverlap(player.x, player.y, player.w, player.h, m.x, m.y, MUSHROOM_W, MUSHROOM_H)) {
      m.collected = true;
      if (!player.big) growPlayer();
      score += 200;
    }
  }
}

// ── Flower logic ──────────────────────────────────────────────────────────────
function updateFlowers() {
  for (const f of flowers) {
    if (f.collected) continue;
    f.vy += GRAVITY * 0.85;
    f.x  += f.vx;
    f.y  += f.vy;
    for (const p of platforms) {
      if (rectOverlap(f.x, f.y, FLOWER_W, FLOWER_H, p.x, p.y, p.w, p.h)) {
        if (f.vy >= 0) { f.y = p.y - FLOWER_H; f.vy = 0; }
      }
    }
    if (f.x < 0)                    { f.x = 0;                  f.vx =  Math.abs(f.vx); }
    if (f.x + FLOWER_W > LEVEL_W)   { f.x = LEVEL_W - FLOWER_W; f.vx = -Math.abs(f.vx); }
    if (f.y > canvas.height + 60) { f.collected = true; continue; }
    if (rectOverlap(player.x, player.y, player.w, player.h, f.x, f.y, FLOWER_W, FLOWER_H)) {
      f.collected = true;
      firePlayer();
      score += 200;
    }
  }
}

// ── Fireball logic ────────────────────────────────────────────────────────────
function updateFireballs() {
  for (const fb of fireballs) {
    if (!fb.active) continue;
    fb.vy += GRAVITY * 0.6;
    fb.x  += fb.vx;
    fb.y  += fb.vy;
    for (const p of platforms) {
      if (rectOverlap(fb.x, fb.y, FIREBALL_W, FIREBALL_H, p.x, p.y, p.w, p.h)) {
        if (fb.vy > 0) {
          fb.y = p.y - FIREBALL_H;
          fb.vy = -Math.abs(fb.vy) * 0.65;
          fb.bounces++;
          if (fb.bounces >= 4) fb.active = false;
        } else {
          fb.active = false;
        }
      }
    }
    if (fb.x < cameraX - 50 || fb.x > cameraX + canvas.width + 50 || fb.y > canvas.height + 20) {
      fb.active = false;
      continue;
    }
    for (const e of enemies) {
      if (e.dead) continue;
      if (rectOverlap(fb.x, fb.y, FIREBALL_W, FIREBALL_H, e.x, e.y, e.w, e.h)) {
        e.dead = true; e.deadTimer = 30;
        fb.active = false;
        score += 200;
        break;
      }
    }
  }
}

// ── Coin logic ────────────────────────────────────────────────────────────────
function updateCoins() {
  for (const c of coins) {
    if (c.collected) continue;
    const cx = c.x - COIN_SIZE/2, cy = c.y - COIN_SIZE/2;
    if (rectOverlap(player.x, player.y, player.w, player.h, cx, cy, COIN_SIZE, COIN_SIZE)) {
      c.collected = true;
      score += 50;
    }
  }
}

// ── Flag logic ────────────────────────────────────────────────────────────────
function updateFlag() {
  if (!flag.reached &&
      rectOverlap(player.x, player.y, player.w, player.h, flag.x, flag.y, flag.w, flag.h)) {
    flag.reached = true;
    wonTimer = 180;
  }
  if (flag.reached) {
    wonTimer--;
    if (wonTimer <= 0) state = 'win';
  }
}

// ── Camera ────────────────────────────────────────────────────────────────────
function updateCamera() {
  const target = player.x - canvas.width / 2 + player.w / 2;
  cameraX = Math.max(0, Math.min(target, LEVEL_W - canvas.width));
}

// ── Draw helpers ──────────────────────────────────────────────────────────────
function drawPlayer() {
  if (player.dead) return;
  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) return;

  const sx = player.x - cameraX;
  const sy = player.y;
  const w  = player.w;
  const h  = player.h;

  if (player.big) {
    const hatColor  = player.fire ? '#fff'     : '#e74c3c';
    const shirtColor= player.fire ? '#fff'     : '#e74c3c';
    const pantColor = player.fire ? '#e74c3c'  : '#2980b9';
    const suspColor = player.fire ? '#c0392b'  : '#1a6fa3';
    // Shoes
    ctx.fillStyle = '#4e342e';
    ctx.fillRect(sx,         sy + h - 10, 14, 10);
    ctx.fillRect(sx + w - 14, sy + h - 10, 14, 10);
    // Overalls
    ctx.fillStyle = pantColor;
    ctx.fillRect(sx + 5, sy + Math.floor(h * 0.48), w - 10, Math.floor(h * 0.52) - 10);
    // Suspenders
    ctx.fillStyle = suspColor;
    ctx.fillRect(sx + 7,      sy + Math.floor(h * 0.37), 5, Math.floor(h * 0.14));
    ctx.fillRect(sx + w - 12, sy + Math.floor(h * 0.37), 5, Math.floor(h * 0.14));
    // Shirt
    ctx.fillStyle = shirtColor;
    ctx.fillRect(sx, sy + Math.floor(h * 0.35), w, Math.floor(h * 0.16));
    // Hat brim
    ctx.fillStyle = hatColor;
    ctx.fillRect(sx - 3, sy + Math.floor(h * 0.17), w + 6, Math.floor(h * 0.12));
    // Hat top
    ctx.fillRect(sx + 5, sy, w - 10, Math.floor(h * 0.19));
    // Face
    ctx.fillStyle = '#f5cba7';
    ctx.fillRect(sx + 5, sy + Math.floor(h * 0.29), w - 10, Math.floor(h * 0.09));
    // Eye
    ctx.fillStyle = '#000';
    const eyeX = player.facing === 1 ? sx + w - 12 : sx + 7;
    ctx.fillRect(eyeX, sy + Math.floor(h * 0.30), 6, 6);
    // Mustache
    ctx.fillStyle = '#5d4037';
    ctx.fillRect(sx + 6, sy + Math.floor(h * 0.37), w - 12, 4);
  } else {
    // Small Mario
    ctx.fillStyle = '#e74c3c';
    ctx.fillRect(sx, sy + 14, w, h - 14);
    ctx.fillRect(sx - 2, sy + 6, w + 4, 10);
    ctx.fillRect(sx + 4, sy, w - 8, 8);
    ctx.fillStyle = '#f5cba7';
    ctx.fillRect(sx + 4, sy + 14, w - 8, 10);
    ctx.fillStyle = '#000';
    const eyeX = player.facing === 1 ? sx + 17 : sx + 7;
    ctx.fillRect(eyeX, sy + 16, 4, 4);
    ctx.fillStyle = '#5d4037';
    ctx.fillRect(sx + 5, sy + 21, w - 10, 3);
    ctx.fillStyle = '#2980b9';
    ctx.fillRect(sx + 4, sy + 24, w - 8, h - 24);
    ctx.fillStyle = '#f5cba7';
    ctx.fillRect(sx + 2, sy + h - 8, 10, 8);
    ctx.fillRect(sx + w - 12, sy + h - 8, 10, 8);
  }
}

function drawPlatforms() {
  for (const p of platforms) {
    const sx = p.x - cameraX;
    if (sx + p.w < 0 || sx > canvas.width) continue;
    ctx.fillStyle = '#c0392b';
    ctx.fillRect(sx, p.y, p.w, Math.min(p.h, 16));
    if (p.h > 16) {
      ctx.fillStyle = '#7f8c8d';
      ctx.fillRect(sx, p.y + 16, p.w, p.h - 16);
    }
    ctx.strokeStyle = '#922b21';
    ctx.lineWidth = 1;
    for (let bx = sx; bx < sx + p.w; bx += 32) ctx.strokeRect(bx, p.y, 32, 16);
  }
}

function drawEnemies() {
  for (const e of enemies) {
    if (e.dead && e.deadTimer <= 0) continue;
    const sx = e.x - cameraX;
    if (sx + e.w < 0 || sx > canvas.width) continue;
    if (e.dead) {
      ctx.fillStyle = '#795548';
      ctx.fillRect(sx, e.y + e.h - 8, e.w, 8);
      continue;
    }
    ctx.fillStyle = '#795548';
    ctx.fillRect(sx, e.y + 10, e.w, e.h - 10);
    ctx.fillStyle = '#a1887f';
    ctx.fillRect(sx + 2, e.y, e.w - 4, 14);
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx + 4, e.y + 3, 7, 6);
    ctx.fillRect(sx + e.w - 11, e.y + 3, 7, 6);
    ctx.fillStyle = '#000';
    ctx.fillRect(sx + 6, e.y + 4, 4, 4);
    ctx.fillRect(sx + e.w - 10, e.y + 4, 4, 4);
    ctx.fillStyle = '#4e342e';
    ctx.fillRect(sx, e.y + e.h - 8, 12, 8);
    ctx.fillRect(sx + e.w - 12, e.y + e.h - 8, 12, 8);
  }
}

function drawMushrooms() {
  for (const m of mushrooms) {
    if (m.collected) continue;
    const sx = m.x - cameraX;
    if (sx < -30 || sx > canvas.width + 30) continue;
    const sy = m.y;
    // Stem
    ctx.fillStyle = '#f5cba7';
    ctx.fillRect(sx + 5, sy + 12, MUSHROOM_W - 10, 10);
    // Cap base fill
    ctx.fillStyle = '#e74c3c';
    ctx.fillRect(sx, sy + 8, MUSHROOM_W, 6);
    // Cap dome
    ctx.beginPath();
    ctx.arc(sx + MUSHROOM_W / 2, sy + 9, MUSHROOM_W / 2, Math.PI, 0);
    ctx.fill();
    // White spots
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(sx + 7,              sy + 6, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx + MUSHROOM_W - 7, sy + 6, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx + MUSHROOM_W / 2, sy + 2, 3, 0, Math.PI * 2); ctx.fill();
    // Eyes on stem
    ctx.fillStyle = '#000';
    ctx.fillRect(sx + 6,              sy + 13, 3, 3);
    ctx.fillRect(sx + MUSHROOM_W - 9, sy + 13, 3, 3);
  }
}

function drawFlowers() {
  for (const f of flowers) {
    if (f.collected) continue;
    const sx = f.x - cameraX;
    if (sx < -30 || sx > canvas.width + 30) continue;
    const sy = f.y;
    // Stem
    ctx.fillStyle = '#27ae60';
    ctx.fillRect(sx + FLOWER_W / 2 - 2, sy + 12, 4, FLOWER_H - 12);
    // Petals
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath(); ctx.arc(sx + FLOWER_W / 2,     sy + 5,  5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx + FLOWER_W / 2 - 7, sy + 10, 5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx + FLOWER_W / 2 + 7, sy + 10, 5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx + FLOWER_W / 2 - 7, sy + 17, 5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx + FLOWER_W / 2 + 7, sy + 17, 5, 0, Math.PI * 2); ctx.fill();
    // Center
    ctx.fillStyle = '#f1c40f';
    ctx.beginPath(); ctx.arc(sx + FLOWER_W / 2, sy + 13, 5, 0, Math.PI * 2); ctx.fill();
  }
}

function drawFireballs() {
  for (const fb of fireballs) {
    if (!fb.active) continue;
    const sx = fb.x - cameraX;
    ctx.fillStyle = '#f39c12';
    ctx.beginPath();
    ctx.arc(sx + FIREBALL_W / 2, fb.y + FIREBALL_H / 2, FIREBALL_W / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(sx + FIREBALL_W / 2 - 2, fb.y + FIREBALL_H / 2 - 2, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawQBoxes() {
  for (const b of qboxes) {
    const off = b.bumpTimer > 8 ? 16 - b.bumpTimer : b.bumpTimer;
    const sx  = b.x - cameraX;
    const sy  = b.y - off;
    if (sx + QBOX_W < 0 || sx > canvas.width) continue;

    if (b.hit) {
      // Used (empty) box — grey
      ctx.fillStyle = '#7f8c8d';
      ctx.fillRect(sx, sy, QBOX_W, QBOX_H);
      ctx.fillStyle = '#95a5a6';
      ctx.fillRect(sx + 2, sy + 2, QBOX_W - 4, QBOX_H / 2);
      ctx.strokeStyle = '#566573';
      ctx.lineWidth = 2;
      ctx.strokeRect(sx + 1, sy + 1, QBOX_W - 2, QBOX_H - 2);
    } else {
      // Active ? box — gold
      ctx.fillStyle = '#e67e22';
      ctx.fillRect(sx, sy, QBOX_W, QBOX_H);
      ctx.fillStyle = '#f39c12';
      ctx.fillRect(sx + 2, sy + 2, QBOX_W - 4, QBOX_H / 2);
      ctx.strokeStyle = '#d35400';
      ctx.lineWidth = 2;
      ctx.strokeRect(sx + 1, sy + 1, QBOX_W - 2, QBOX_H - 2);
      // ? mark
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 20px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('?', sx + QBOX_W / 2, sy + QBOX_H - 7);
      ctx.textAlign = 'left';
    }
  }
}

function drawCoins() {
  for (const c of coins) {
    if (c.collected) continue;
    const sx = c.x - cameraX;
    if (sx < -20 || sx > canvas.width + 20) continue;
    ctx.fillStyle = '#f1c40f';
    ctx.beginPath();
    ctx.arc(sx, c.y, COIN_SIZE / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#f39c12';
    ctx.beginPath();
    ctx.arc(sx - 2, c.y - 2, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawFlag() {
  const sx = flag.x - cameraX;
  ctx.fillStyle = '#bdc3c7';
  ctx.fillRect(sx, flag.y, flag.w, flag.h);
  ctx.fillStyle = '#27ae60';
  ctx.fillRect(sx + flag.w, flag.y, 36, 24);
  ctx.fillStyle = '#f1c40f';
  ctx.beginPath();
  ctx.arc(sx + flag.w / 2, flag.y, 8, 0, Math.PI * 2);
  ctx.fill();
}

function drawBackground() {
  ctx.fillStyle = '#5b9bd5';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#fff';
  const cloudPositions = [100, 400, 700, 1100, 1500, 1900, 2300, 2700, 3000];
  for (const cx of cloudPositions) {
    const sx = cx - cameraX * 0.3;
    if (sx < -120 || sx > canvas.width + 120) continue;
    ctx.beginPath();
    ctx.arc(sx,       80, 30, 0, Math.PI * 2);
    ctx.arc(sx + 35,  68, 38, 0, Math.PI * 2);
    ctx.arc(sx + 70,  80, 28, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = '#4a7c59';
  const hills = [200, 600, 1100, 1700, 2200, 2800];
  for (const hx of hills) {
    const sx = hx - cameraX * 0.6;
    if (sx < -200 || sx > canvas.width + 200) continue;
    ctx.beginPath();
    ctx.arc(sx, GROUND_Y, 120, Math.PI, 0);
    ctx.fill();
  }
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, canvas.width, 44);
  ctx.font = 'bold 18px monospace';
  ctx.fillStyle = '#fff';
  ctx.fillText('WORLD 1-1', 20, 28);
  ctx.fillText(`SCORE: ${score}`, canvas.width / 2 - 60, 28);
  ctx.fillText(`LIVES: ${lives}`, canvas.width - 130, 28);
  if (player.fire) {
    ctx.fillStyle = '#e74c3c';
    ctx.fillText('FIRE  X:shoot', canvas.width - 270, 28);
  } else if (player.big) {
    ctx.fillStyle = '#f1c40f';
    ctx.fillText('SUPER', canvas.width - 230, 28);
  }
}

// ── Overlay screens ───────────────────────────────────────────────────────────
function drawOverlay(title, sub) {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#f1c40f';
  ctx.font = 'bold 52px monospace';
  ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 40);
  ctx.fillStyle = '#fff';
  ctx.font = '22px monospace';
  ctx.fillText(sub, canvas.width / 2, canvas.height / 2 + 10);
  ctx.textAlign = 'left';
}

// ── Main loop ─────────────────────────────────────────────────────────────────
let enterWasDown = false;

function loop() {
  requestAnimationFrame(loop);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const enterDown = pressed('Enter', 'NumpadEnter');

  if (state === 'start') {
    drawBackground();
    drawOverlay('SUPER MARIO', 'Press ENTER to start  |  ← →  Jump ↑  Shoot X');
    if (enterDown && !enterWasDown) { state = 'play'; buildLevel(); }
  } else if (state === 'play') {
    updatePlayer();
    if (!player.dead) {
      updateQBoxes();
      updateEnemies();
      updateMushrooms();
      updateFlowers();
      updateFireballs();
      updateCoins();
      updateFlag();
      updateCamera();
    }
    drawBackground();
    drawFlag();
    drawPlatforms();
    drawQBoxes();
    drawMushrooms();
    drawFlowers();
    drawFireballs();
    drawCoins();
    drawEnemies();
    drawPlayer();
    drawHUD();
  } else if (state === 'gameover') {
    drawBackground();
    drawOverlay('GAME OVER', `Score: ${score}   Press ENTER to retry`);
    if (enterDown && !enterWasDown) { score = 0; lives = 3; buildLevel(); state = 'play'; }
  } else if (state === 'win') {
    drawBackground();
    drawFlag();
    drawPlatforms();
    drawPlayer();
    drawHUD();
    drawOverlay('YOU WIN!', `Score: ${score}   Press ENTER to play again`);
    if (enterDown && !enterWasDown) { score = 0; lives = 3; buildLevel(); state = 'play'; }
  }

  enterWasDown = enterDown;
}

resetGame();
loop();
</script>
