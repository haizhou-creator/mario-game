<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Super Mario</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; }
canvas { display: block; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="c" width="800" height="500"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── Level data ──────────────────────────────────────────────────────────────
const LEVEL_W = 3200;
const GROUND_Y = 440;

// [x, y, w, h]
const PLATFORM_DATA = [
  [0,    GROUND_Y, LEVEL_W, 60],   // ground
  [250,  370, 120, 16],
  [440,  310, 120, 16],
  [640,  370, 150, 16],
  [850,  300, 120, 16],
  [1050, 360, 140, 16],
  [1250, 280, 100, 16],
  [1430, 340, 130, 16],
  [1650, 260, 120, 16],
  [1850, 340, 150, 16],
  [2050, 290, 110, 16],
  [2250, 360, 130, 16],
  [2450, 300, 120, 16],
  [2650, 370, 140, 16],
  [2850, 310, 100, 16],
];

// [x, y, patrolRange]
const ENEMY_DATA = [
  [350,  GROUND_Y - 30, 80],
  [700,  354,           80],
  [950,  284,           80],
  [1300, GROUND_Y - 30, 90],
  [1500, 324,           70],
  [1900, 324,           90],
  [2100, GROUND_Y - 30, 100],
  [2500, 284,           80],
  [2700, 354,           90],
];

// [x, y]
const COIN_DATA = [
  [270, 340], [310, 340], [350, 340],
  [460, 280], [500, 280],
  [660, 340], [700, 340],
  [870, 270], [910, 270],
  [1070, 330], [1110, 330],
  [1270, 250], [1310, 250],
  [1460, 310], [1500, 310],
  [1670, 230], [1710, 230],
  [1870, 310], [1910, 310],
  [2270, 330], [2310, 330],
  [2470, 270], [2510, 270],
  [2670, 340], [2710, 340],
];

const FLAG_X = 3050;

// ── Constants ────────────────────────────────────────────────────────────────
const GRAVITY   = 0.55;
const JUMP_VEL  = -13;
const SPEED     = 4;
const COIN_SIZE = 14;
const ENEMY_W   = 32;
const ENEMY_H   = 28;
const PLAYER_W  = 28;
const PLAYER_H  = 36;

// ── Input ────────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true;  e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

function pressed(...codes) { return codes.some(c => keys[c]); }

// ── Helpers ──────────────────────────────────────────────────────────────────
function rectOverlap(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

// ── Game state ───────────────────────────────────────────────────────────────
let state, score, lives, cameraX;
let player, platforms, enemies, coins, flag;
let deathTimer, wonTimer;

function resetGame() {
  score = 0; lives = 3; cameraX = 0;
  state = 'start';
  buildLevel();
}

function buildLevel() {
  player = {
    x: 80, y: GROUND_Y - PLAYER_H,
    vx: 0, vy: 0,
    onGround: false,
    dead: false, invincible: 0,
    facing: 1,
  };
  platforms = PLATFORM_DATA.map(([x,y,w,h]) => ({x,y,w,h}));
  enemies   = ENEMY_DATA.map(([x,y,r]) => ({
    x, y: y - ENEMY_H, w: ENEMY_W, h: ENEMY_H,
    vx: 1.2, startX: x, range: r, dead: false, deadTimer: 0,
  }));
  coins = COIN_DATA.map(([x,y]) => ({x, y, collected: false}));
  flag  = { x: FLAG_X, y: GROUND_Y - 160, w: 12, h: 160, reached: false };
  deathTimer = 0; wonTimer = 0;
}

// ── Player logic ─────────────────────────────────────────────────────────────
function updatePlayer() {
  if (player.dead) {
    deathTimer--;
    if (deathTimer <= 0) {
      lives--;
      if (lives <= 0) { state = 'gameover'; return; }
      buildLevel(); state = 'play';
    }
    return;
  }

  if (player.invincible > 0) player.invincible--;

  // Horizontal
  if (pressed('ArrowLeft','KeyA'))  { player.vx = -SPEED; player.facing = -1; }
  else if (pressed('ArrowRight','KeyD')) { player.vx =  SPEED; player.facing =  1; }
  else player.vx = 0;

  // Jump
  if (pressed('ArrowUp','KeyW','Space') && player.onGround) {
    player.vy = JUMP_VEL;
    player.onGround = false;
  }

  player.vy += GRAVITY;
  player.x  += player.vx;
  player.y  += player.vy;

  // Keep in level
  if (player.x < 0) player.x = 0;
  if (player.x + PLAYER_W > LEVEL_W) player.x = LEVEL_W - PLAYER_W;

  // Platform collision
  player.onGround = false;
  for (const p of platforms) {
    if (rectOverlap(player.x, player.y, PLAYER_W, PLAYER_H, p.x, p.y, p.w, p.h)) {
      const overlapBottom = (player.y + PLAYER_H) - p.y;
      const overlapTop    = (p.y + p.h) - player.y;
      const overlapLeft   = (player.x + PLAYER_W) - p.x;
      const overlapRight  = (p.x + p.w) - player.x;
      const minO = Math.min(overlapBottom, overlapTop, overlapLeft, overlapRight);
      if (minO === overlapBottom && player.vy >= 0) {
        player.y = p.y - PLAYER_H; player.vy = 0; player.onGround = true;
      } else if (minO === overlapTop && player.vy < 0) {
        player.y = p.y + p.h; player.vy = 0;
      } else if (minO === overlapLeft) {
        player.x = p.x - PLAYER_W;
      } else if (minO === overlapRight) {
        player.x = p.x + p.w;
      }
    }
  }

  // Fell off
  if (player.y > canvas.height + 100) killPlayer();
}

function killPlayer() {
  if (player.invincible > 0 || player.dead) return;
  player.dead = true;
  player.vy = -10;
  deathTimer = 90;
}

// ── Enemy logic ───────────────────────────────────────────────────────────────
function updateEnemies() {
  for (const e of enemies) {
    if (e.dead) { e.deadTimer--; continue; }
    e.x += e.vx;
    if (e.x <= e.startX - e.range || e.x + e.w >= e.startX + e.range) e.vx *= -1;

    // Enemy vs player
    if (!player.dead && player.invincible === 0 &&
        rectOverlap(player.x, player.y, PLAYER_W, PLAYER_H, e.x, e.y, e.w, e.h)) {
      const playerBottom = player.y + PLAYER_H;
      const enemyTop     = e.y;
      // Stomp: player falling and player's feet near enemy's top
      if (player.vy > 0 && playerBottom - enemyTop < 16) {
        e.dead = true; e.deadTimer = 30;
        player.vy = -8;
        score += 100;
      } else {
        killPlayer();
      }
    }
  }
}

// ── Coin logic ────────────────────────────────────────────────────────────────
function updateCoins() {
  for (const c of coins) {
    if (c.collected) continue;
    const cx = c.x - COIN_SIZE/2, cy = c.y - COIN_SIZE/2;
    if (rectOverlap(player.x, player.y, PLAYER_W, PLAYER_H, cx, cy, COIN_SIZE, COIN_SIZE)) {
      c.collected = true;
      score += 50;
    }
  }
}

// ── Flag logic ────────────────────────────────────────────────────────────────
function updateFlag() {
  if (!flag.reached &&
      rectOverlap(player.x, player.y, PLAYER_W, PLAYER_H, flag.x, flag.y, flag.w, flag.h)) {
    flag.reached = true;
    wonTimer = 180;
  }
  if (flag.reached) {
    wonTimer--;
    if (wonTimer <= 0) state = 'win';
  }
}

// ── Camera ────────────────────────────────────────────────────────────────────
function updateCamera() {
  const target = player.x - canvas.width / 2 + PLAYER_W / 2;
  cameraX = Math.max(0, Math.min(target, LEVEL_W - canvas.width));
}

// ── Draw helpers ──────────────────────────────────────────────────────────────
function drawPlayer() {
  const sx = player.x - cameraX;
  const sy = player.y;
  if (player.dead) return; // hidden during death bounce (or keep for effect)
  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) return;

  // Body
  ctx.fillStyle = '#e74c3c';
  ctx.fillRect(sx, sy + 14, PLAYER_W, PLAYER_H - 14);

  // Hat
  ctx.fillStyle = '#e74c3c';
  ctx.fillRect(sx - 2, sy + 6, PLAYER_W + 4, 10);
  ctx.fillRect(sx + 4, sy, PLAYER_W - 8, 8);

  // Face
  ctx.fillStyle = '#f5cba7';
  ctx.fillRect(sx + 4, sy + 14, PLAYER_W - 8, 10);

  // Eye
  ctx.fillStyle = '#000';
  const eyeX = player.facing === 1 ? sx + 17 : sx + 7;
  ctx.fillRect(eyeX, sy + 16, 4, 4);

  // Mustache
  ctx.fillStyle = '#5d4037';
  ctx.fillRect(sx + 5, sy + 21, PLAYER_W - 10, 3);

  // Overalls
  ctx.fillStyle = '#2980b9';
  ctx.fillRect(sx + 4, sy + 24, PLAYER_W - 8, PLAYER_H - 24);
  ctx.fillStyle = '#f5cba7';
  ctx.fillRect(sx + 2, sy + PLAYER_H - 8, 10, 8); // left shoe
  ctx.fillRect(sx + PLAYER_W - 12, sy + PLAYER_H - 8, 10, 8); // right shoe
}

function drawPlatforms() {
  for (const p of platforms) {
    const sx = p.x - cameraX;
    if (sx + p.w < 0 || sx > canvas.width) continue;
    // Top brick row
    ctx.fillStyle = '#c0392b';
    ctx.fillRect(sx, p.y, p.w, Math.min(p.h, 16));
    if (p.h > 16) {
      ctx.fillStyle = '#7f8c8d';
      ctx.fillRect(sx, p.y + 16, p.w, p.h - 16);
    }
    // Brick lines on top row
    ctx.strokeStyle = '#922b21';
    ctx.lineWidth = 1;
    for (let bx = sx; bx < sx + p.w; bx += 32) {
      ctx.strokeRect(bx, p.y, 32, 16);
    }
  }
}

function drawEnemies() {
  for (const e of enemies) {
    if (e.dead && e.deadTimer <= 0) continue;
    const sx = e.x - cameraX;
    if (sx + e.w < 0 || sx > canvas.width) continue;
    if (e.dead) {
      // Squished
      ctx.fillStyle = '#795548';
      ctx.fillRect(sx, e.y + e.h - 8, e.w, 8);
      continue;
    }
    // Body
    ctx.fillStyle = '#795548';
    ctx.fillRect(sx, e.y + 10, e.w, e.h - 10);
    // Head
    ctx.fillStyle = '#a1887f';
    ctx.fillRect(sx + 2, e.y, e.w - 4, 14);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx + 4, e.y + 3, 7, 6);
    ctx.fillRect(sx + e.w - 11, e.y + 3, 7, 6);
    ctx.fillStyle = '#000';
    ctx.fillRect(sx + 6, e.y + 4, 4, 4);
    ctx.fillRect(sx + e.w - 10, e.y + 4, 4, 4);
    // Feet
    ctx.fillStyle = '#4e342e';
    ctx.fillRect(sx, e.y + e.h - 8, 12, 8);
    ctx.fillRect(sx + e.w - 12, e.y + e.h - 8, 12, 8);
  }
}

function drawCoins() {
  for (const c of coins) {
    if (c.collected) continue;
    const sx = c.x - cameraX;
    if (sx < -20 || sx > canvas.width + 20) continue;
    ctx.fillStyle = '#f1c40f';
    ctx.beginPath();
    ctx.arc(sx, c.y, COIN_SIZE / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#f39c12';
    ctx.beginPath();
    ctx.arc(sx - 2, c.y - 2, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawFlag() {
  const sx = flag.x - cameraX;
  // Pole
  ctx.fillStyle = '#bdc3c7';
  ctx.fillRect(sx, flag.y, flag.w, flag.h);
  // Flag cloth
  ctx.fillStyle = '#27ae60';
  ctx.fillRect(sx + flag.w, flag.y, 36, 24);
  // Ball on top
  ctx.fillStyle = '#f1c40f';
  ctx.beginPath();
  ctx.arc(sx + flag.w / 2, flag.y, 8, 0, Math.PI * 2);
  ctx.fill();
}

function drawBackground() {
  // Sky
  ctx.fillStyle = '#5b9bd5';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Clouds
  ctx.fillStyle = '#fff';
  const cloudPositions = [100, 400, 700, 1100, 1500, 1900, 2300, 2700, 3000];
  for (const cx of cloudPositions) {
    const sx = cx - cameraX * 0.3; // parallax
    if (sx < -120 || sx > canvas.width + 120) continue;
    ctx.beginPath();
    ctx.arc(sx,       80, 30, 0, Math.PI * 2);
    ctx.arc(sx + 35,  68, 38, 0, Math.PI * 2);
    ctx.arc(sx + 70,  80, 28, 0, Math.PI * 2);
    ctx.fill();
  }

  // Hills
  ctx.fillStyle = '#4a7c59';
  const hills = [200, 600, 1100, 1700, 2200, 2800];
  for (const hx of hills) {
    const sx = hx - cameraX * 0.6;
    if (sx < -200 || sx > canvas.width + 200) continue;
    ctx.beginPath();
    ctx.arc(sx, GROUND_Y, 120, Math.PI, 0);
    ctx.fill();
  }
}

function drawHUD() {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, canvas.width, 44);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('WORLD 1-1', 20, 28);

  ctx.fillText(`SCORE: ${score}`, canvas.width / 2 - 60, 28);

  ctx.fillText(`LIVES: ${lives}`, canvas.width - 130, 28);
}

// ── Overlay screens ───────────────────────────────────────────────────────────
function drawOverlay(title, sub) {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#f1c40f';
  ctx.font = 'bold 52px monospace';
  ctx.fillText(title, canvas.width / 2, canvas.height / 2 - 40);
  ctx.fillStyle = '#fff';
  ctx.font = '22px monospace';
  ctx.fillText(sub, canvas.width / 2, canvas.height / 2 + 10);
  ctx.textAlign = 'left';
}

// ── Main loop ─────────────────────────────────────────────────────────────────
let enterWasDown = false;

function loop() {
  requestAnimationFrame(loop);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const enterDown = pressed('Enter', 'NumpadEnter');

  if (state === 'start') {
    drawBackground();
    drawOverlay('SUPER MARIO', 'Press ENTER to start  |  ← → Jump ↑');
    if (enterDown && !enterWasDown) { state = 'play'; buildLevel(); }
  } else if (state === 'play') {
    updatePlayer();
    if (!player.dead) {
      updateEnemies();
      updateCoins();
      updateFlag();
      updateCamera();
    }
    drawBackground();
    drawFlag();
    drawPlatforms();
    drawCoins();
    drawEnemies();
    drawPlayer();
    drawHUD();
  } else if (state === 'gameover') {
    drawBackground();
    drawOverlay('GAME OVER', `Score: ${score}   Press ENTER to retry`);
    if (enterDown && !enterWasDown) { score = 0; lives = 3; buildLevel(); state = 'play'; }
  } else if (state === 'win') {
    drawBackground();
    drawFlag();
    drawPlatforms();
    drawPlayer();
    drawHUD();
    drawOverlay('YOU WIN!', `Score: ${score}   Press ENTER to play again`);
    if (enterDown && !enterWasDown) { score = 0; lives = 3; buildLevel(); state = 'play'; }
  }

  enterWasDown = enterDown;
}

resetGame();
loop();
</script>
</body>
</html>
